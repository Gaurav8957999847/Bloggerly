services:
  - type: web
    name: bloggerly-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URL
        sync: false # Set this in the Render dashboard manually
      - key: JWT_SECRET
        generateValue: true # Generates a random secret if not provided
      - key: PORT
        value: 5000
